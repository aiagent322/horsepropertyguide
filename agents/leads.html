<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Georgia, serif; background: #f4f0eb; margin: 0; padding: 0; }
    #login { max-width: 340px; margin: 80px auto; background: #fff; padding: 32px; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    #login h1 { font-size: 1.2em; margin: 0 0 20px; color: #2c5f2e; }
    #login input { display: block; width: 100%; padding: 10px; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 12px; }
    #login button { display: block; width: 100%; padding: 12px; background: #2c5f2e; color: #fff; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
    #login button:hover { background: #234d25; }
    #app { display: none; max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }
    #app h1 { font-size: 1.4em; color: #2c5f2e; margin-bottom: 4px; }
    #app .meta { font-size: 0.85em; color: #888; margin-bottom: 24px; }
    .lead { background: #fff; border-radius: 6px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .lead .date { font-size: 0.78em; color: #999; margin-bottom: 6px; }
    .lead .agent { font-size: 0.85em; color: #8b5e3c; font-weight: bold; margin-bottom: 8px; }
    .lead .sender { font-size: 1em; font-weight: bold; color: #222; }
    .lead .email { font-size: 0.9em; margin: 2px 0 8px; }
    .lead .email a { color: #2c5f2e; text-decoration: none; }
    .lead .message { font-size: 0.95em; color: #333; line-height: 1.6; border-top: 1px solid #eee; padding-top: 10px; margin-top: 4px; }
    .empty { text-align: center; color: #999; padding: 40px 0; }
    #logout { display: block; margin: 0 auto 20px; padding: 8px 20px; background: none; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85em; cursor: pointer; color: #666; }
    #logout:hover { background: #eee; }
    #error { color: #c00; font-size: 0.9em; margin-top: 8px; }
  </style>
</head>
<body>

<div id="login">
  <h1>HorsePropertyGuide Leads</h1>
  <input type="password" id="pwd" placeholder="Password" autocomplete="current-password" style="font-size:16px;">
  <button onclick="checkPassword()">Sign In</button>
  <div id="error"></div>
</div>

<div id="app">
  <button id="logout" onclick="signOut()">Sign Out</button>
  <h1>Lead Submissions</h1>
  <div class="meta" id="lead-count"></div>
  <div id="leads-list">Loading...</div>
</div>

<script>
  const PASS_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8'; // "password" — change below
  const supabaseUrl = "https://ykkfziyxipeuugocwswo.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlra2Z6aXl4aXBldXVnb2N3c3dvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzk3MjIwNSwiZXhwIjoyMDg5NTQ4MjA1fQ.Qb5iS8fflfepdNvjf7fEUZmBGmYTY1pepVxsY8fshtk";
  const _sb = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkPassword() {
    const pwd = document.getElementById('pwd').value;
    const hash = await sha256(pwd);
    if (hash === PASS_HASH) {
      sessionStorage.setItem('leads_auth', '1');
      showApp();
    } else {
      document.getElementById('error').textContent = 'Incorrect password.';
    }
  }

  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function signOut() {
    sessionStorage.removeItem('leads_auth');
    document.getElementById('app').style.display = 'none';
    document.getElementById('login').style.display = 'block';
  }

  async function showApp() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadLeads();
  }

  async function loadLeads() {
    const { data, error } = await _sb
      .from('leads')
      .select('*')
      .order('created_at', { ascending: false });

    const container = document.getElementById('leads-list');
    if (error) { container.innerHTML = '<p class="empty">Error loading leads.</p>'; return; }
    if (!data || data.length === 0) { container.innerHTML = '<p class="empty">No leads yet.</p>'; return; }

    document.getElementById('lead-count').textContent = data.length + ' lead' + (data.length !== 1 ? 's' : '') + ' received';

    container.innerHTML = '';
    data.forEach(lead => {
      const date = new Date(lead.created_at).toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
      const div = document.createElement('div');
      div.className = 'lead';
      div.innerHTML = `
        <div class="date">${date}</div>
        ${lead.agent_name ? '<div class="agent">→ ' + lead.agent_name + (lead.agent_email ? ' &lt;' + lead.agent_email + '&gt;' : '') + '</div>' : ''}
        <div class="sender">${lead.sender_name}</div>
        <div class="email"><a href="mailto:${lead.sender_email}">${lead.sender_email}</a></div>
        <div class="message">${lead.message}</div>
      `;
      container.appendChild(div);
    });
  }

  // Auto-login if session active
  if (sessionStorage.getItem('leads_auth') === '1') showApp();
</script>

</body>
</html>
